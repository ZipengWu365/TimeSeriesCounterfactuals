name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
      - name: Build docs
        run: mkdocs build --strict
